<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Monica Group — Strategic Investment Holding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --charcoal: #080808;
            --charcoal-light: #111111;
            --gold: #c9a84c;
            --gold-dim: rgba(201, 168, 76, 0.4);
            --gold-faint: rgba(201, 168, 76, 0.1);
            --gold-bright: rgba(201, 168, 76, 0.9);
            --white: #ffffff;
            --white-dim: rgba(255, 255, 255, 0.7);
            --slate: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== STARFIELD ===== */
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--twinkle-duration) ease-in-out infinite;
            animation-delay: var(--twinkle-delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--max-opacity); transform: scale(1); }
        }
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
            animation: nebulaDrift 20s ease-in-out infinite alternate;
        }
        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.1); }
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 24px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            opacity: 0;
            animation: fadeInNav 1s ease 7s forwards;
        }
        @keyframes fadeInNav {
            to { opacity: 1; }
        }
        .nav-logo { display: flex; align-items: center; }
        .nav-logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 45px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--white-dim);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
            overflow: hidden;
            padding-top: 80px;
        }

        .ecosystem-svg {
            position: absolute;
            width: 85vmin;
            height: 85vmin;
            max-width: 900px;
            max-height: 900px;
            pointer-events: none;
            overflow: visible;
        }

        /* ===== CENTER GROUP ===== */
        .center-group {
            opacity: 0;
            animation: centerFadeIn 1s ease-out forwards;
        }
        @keyframes centerFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .center-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            fill: var(--white);
            text-anchor: middle;
        }
        .center-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            fill: var(--gold-dim);
            text-anchor: middle;
        }
        .center-diamond {
            fill: none;
            stroke: var(--gold);
            stroke-width: 1.5;
            opacity: 0;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawDiamond 0.8s ease-out 0.5s forwards;
        }
        @keyframes drawDiamond {
            0% { opacity: 0; stroke-dashoffset: 200; }
            20% { opacity: 0.8; }
            100% { opacity: 0.8; stroke-dashoffset: 0; }
        }
        .center-dot {
            fill: var(--gold);
            opacity: 0;
            animation: fadeInDot 0.4s ease-out 1.2s forwards;
        }
        @keyframes fadeInDot {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 0.6; transform: scale(1); }
        }

        /* ===== MAIN CIRCLE ===== */
        .main-circle {
            fill: none;
            stroke: var(--gold);
            stroke-width: 1;
            opacity: 0;
            stroke-dasharray: 1885;
            stroke-dashoffset: 1885;
            animation: drawCircle 1.5s ease-out 0.8s forwards;
        }
        @keyframes drawCircle {
            0% { opacity: 0; stroke-dashoffset: 1885; }
            10% { opacity: 0.4; }
            100% { opacity: 0.4; stroke-dashoffset: 0; }
        }

        /* ===== BRANCHES ===== */
        .branch {
            fill: none;
            stroke: var(--gold);
            stroke-width: 1;
            opacity: 0;
            stroke-dasharray: var(--branch-length);
            stroke-dashoffset: var(--branch-length);
            animation: drawBranch 0.6s ease-out forwards;
        }
        @keyframes drawBranch {
            0% { opacity: 0; stroke-dashoffset: var(--branch-length); }
            20% { opacity: 0.4; }
            100% { opacity: 0.4; stroke-dashoffset: 0; }
        }

        /* ===== NODES ===== */
        .node-group {
            opacity: 0;
            /* No transform here - handled by child elements */
        }
        .node-scale {
            transform: scale(0);
            transform-origin: center;
            animation: nodeScaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes nodeScaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .node-frame {
            fill: var(--black);
            stroke: var(--gold);
            stroke-width: 1;
            opacity: 0;
            stroke-dasharray: 264;
            stroke-dashoffset: 264;
            animation: drawNodeFrame 0.5s ease-out forwards;
        }
        @keyframes drawNodeFrame {
            0% { opacity: 0; stroke-dashoffset: 264; }
            20% { opacity: 1; }
            100% { opacity: 1; stroke-dashoffset: 0; }
        }
        .node-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            fill: var(--white);
            text-anchor: middle;
            dominant-baseline: middle;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeInText 0.3s ease-out forwards;
        }
        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* ===== THE SINGLE TRAVELING LIGHT ===== */
        .traveling-light {
            fill: var(--gold);
            filter: blur(1px);
            opacity: 0;
        }
        .traveling-light.active {
            animation: lightTravel var(--travel-duration) ease-in-out forwards;
        }
        @keyframes lightTravel {
            0% { opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Light trail glow */
        .light-glow {
            fill: var(--gold);
            opacity: 0;
            filter: blur(4px);
        }
        .light-glow.active {
            animation: glowTravel var(--travel-duration) ease-in-out forwards;
        }
        @keyframes glowTravel {
            0% { opacity: 0; }
            5% { opacity: 0.5; }
            95% { opacity: 0.5; }
            100% { opacity: 0; }
        }

        /* ===== NODE ACTIVATION FLASH ===== */
        .node-flash {
            fill: none;
            stroke: var(--gold);
            stroke-width: 2;
            opacity: 0;
            transform-origin: center;
        }
        .node-flash.active {
            animation: nodeFlash 0.6s ease-out forwards;
        }
        @keyframes nodeFlash {
            0% { opacity: 0.8; transform: scale(0.8); }
            50% { opacity: 0.4; }
            100% { opacity: 0; transform: scale(1.8); }
        }

        /* ===== SETTLED ROTATING LIGHT (after animation) ===== */
        .settled-rotating-light {
            fill: none;
            stroke: var(--gold);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 80, 1805;
            stroke-dashoffset: 0;
            opacity: 0;
            filter: blur(1px);
            transform-origin: 400px 400px;
            animation: 
                fadeInLight 1s ease-out 6.5s forwards,
                rotateLight 10s linear 7s infinite;
        }
        @keyframes fadeInLight {
            from { opacity: 0; }
            to { opacity: 0.6; }
        }
        @keyframes rotateLight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== SCROLL DOWN ===== */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            opacity: 0;
            animation: fadeInScroll 1s ease 7.5s forwards;
        }
        @keyframes fadeInScroll {
            to { opacity: 1; }
        }
        .scroll-down span {
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold-dim);
        }
        .scroll-arrow {
            width: 18px;
            height: 18px;
            border-right: 1px solid var(--gold-dim);
            border-bottom: 1px solid var(--gold-dim);
            transform: rotate(45deg);
            animation: bounceArrow 2s ease-in-out infinite;
        }
        @keyframes bounceArrow {
            0%, 100% { transform: rotate(45deg) translate(0, 0); }
            50% { transform: rotate(45deg) translate(4px, 4px); }
        }

        /* ===== CONTENT ===== */
        .portfolio {
            padding: 140px 50px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section-header {
            text-align: center;
            margin-bottom: 70px;
        }
        .section-label {
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
        }
        .portfolio-card {
            background: var(--charcoal);
            border: 1px solid var(--gold-faint);
            border-radius: 6px;
            padding: 45px 35px;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-decoration: none;
            color: inherit;
        }
        .portfolio-card:hover {
            border-color: var(--gold-dim);
            background: var(--charcoal-light);
            transform: translateY(-4px);
        }
        .card-initial {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--gold);
            margin-bottom: 20px;
            line-height: 1;
        }
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 14px;
            letter-spacing: 0.03em;
        }
        .card-description {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--white-dim);
            font-weight: 300;
            margin-bottom: 20px;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }
        .card-tag {
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--gold-faint);
            padding: 5px 10px;
            border-radius: 2px;
        }

        footer {
            padding: 60px 50px;
            border-top: 1px solid var(--charcoal-light);
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--slate);
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            nav { padding: 20px 30px; }
            .nav-links { display: none; }
            .section-title { font-size: 2.2rem; }
            .portfolio { padding: 80px 30px; }
            .ecosystem-svg { width: 95vmin; height: 95vmin; }
        }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>
    <div class="nebula" style="width: 500px; height: 500px; background: radial-gradient(circle, rgba(100,80,150,0.3) 0%, transparent 70%); top: 10%; left: -10%;"></div>
    <div class="nebula" style="width: 400px; height: 400px; background: radial-gradient(circle, rgba(80,100,120,0.3) 0%, transparent 70%); bottom: 20%; right: -5%; animation-delay: -5s;"></div>

    <nav id="navbar">
        <a href="index.html" class="nav-logo">
            <span class="nav-logo-text">SM</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="#portfolio" id="portfolioLink">Portfolio</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <div style="width: 120px;"></div>
    </nav>

    <main>
        <section class="hero" id="hero">
            <svg class="ecosystem-svg" viewBox="0 0 800 800" id="ecosystemSvg">
                <!-- Main circle -->
                <circle cx="400" cy="400" r="300" class="main-circle" id="mainCircle" />

                <!-- Settled rotating light (appears after animation) -->
                <circle cx="400" cy="400" r="300" class="settled-rotating-light" id="settledRotatingLight" />

                <!-- Branches group -->
                <g id="branchesG"></g>

                <!-- Nodes group -->
                <g id="nodesG"></g>

                <!-- Traveling light path (invisible) -->
                <path id="travelPath" style="display:none;" />

                <!-- Traveling light particle -->
                <g id="travelingLightG">
                    <circle r="5" class="light-glow" id="lightGlow" />
                    <circle r="2.5" class="traveling-light" id="travelingLight" />
                </g>

                <!-- Node flash effects -->
                <g id="nodeFlashesG"></g>

                <!-- Center group -->
                <g class="center-group" id="centerGroup">
                    <polygon points="400,360 420,395 400,430 380,395" fill="none" class="center-diamond" id="centerDiamond"/>
                    <circle cx="400" cy="395" r="8" class="center-dot" id="centerDot"/>
                    <text x="400" y="460" class="center-name" id="centerName">Santa Monica Group</text>
                    <text x="400" y="480" class="center-subtitle" id="centerSubtitle">Investment Holding</text>
                </g>
            </svg>

            <a href="#portfolio" class="scroll-down" id="scrollDown">
                <span>Explore</span>
                <div class="scroll-arrow"></div>
            </a>
        </section>

        <div class="portfolio" id="mainContent">
            <section id="portfolio">
                <div class="section-header">
                    <span class="section-label">Investment Ecosystem</span>
                    <h2 class="section-title">Strategic Portfolio</h2>
                </div>
                <div class="portfolio-grid" id="portfolioGrid"></div>
            </section>
            <footer>
                &copy; 2025 Santa Monica Group. Refined Excellence in Investment.
            </footer>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const starfield = document.getElementById('starfield');
            const portfolioGrid = document.getElementById('portfolioGrid');
            const portfolioLink = document.getElementById('portfolioLink');
            const scrollDown = document.getElementById('scrollDown');
            const branchesG = document.getElementById('branchesG');
            const nodesG = document.getElementById('nodesG');
            const travelPath = document.getElementById('travelPath');
            const travelingLight = document.getElementById('travelingLight');
            const lightGlow = document.getElementById('lightGlow');
            const nodeFlashesG = document.getElementById('nodeFlashesG');

            // 4 companies (cardinal directions matching the screenshot)
            const companies = [
                { name: 'Aurum Capital', initial: 'A', angle: -90, tags: ['Private Equity', 'Venture Capital'], desc: 'A premier private equity firm specializing in growth-stage investments across technology and healthcare sectors.' },
                { name: 'Veridian Holdings', initial: 'V', angle: 0, tags: ['Real Estate', 'Infrastructure'], desc: 'A leading real estate and infrastructure investment platform with assets across commercial and residential portfolios.' },
                { name: 'Meridian Partners', initial: 'M', angle: 90, tags: ['Financial', 'Banking'], desc: 'A strategic financial services investor with deep expertise in banking, insurance, and asset management.' },
                { name: 'Crestwood Group', initial: 'C', angle: 180, tags: ['Energy', 'Resources'], desc: 'A diversified energy and natural resources investment vehicle focused on sustainable and renewable assets.' }
            ];

            const centerX = 400;
            const centerY = 400;
            const innerRadius = 300;
            const branchLength = 90;
            const nodeRadius = 42;

            // Stars
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 1.5 + 0.5;
                star.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
                    --twinkle-duration: ${2 + Math.random() * 3}s;
                    --twinkle-delay: ${Math.random() * 5}s;
                    --max-opacity: ${Math.random() * 0.5 + 0.1};
                `;
                starfield.appendChild(star);
            }

            // Build branches and nodes with staggered animations
            const nodePositions = [];

            companies.forEach((company, i) => {
                const angleRad = (company.angle * Math.PI) / 180;
                const xStart = centerX + innerRadius * Math.cos(angleRad);
                const yStart = centerY + innerRadius * Math.sin(angleRad);
                const branchEndDist = innerRadius + branchLength - nodeRadius;
                const xEnd = centerX + branchEndDist * Math.cos(angleRad);
                const yEnd = centerY + branchEndDist * Math.sin(angleRad);
                const nodeX = centerX + (innerRadius + branchLength) * Math.cos(angleRad);
                const nodeY = centerY + (innerRadius + branchLength) * Math.sin(angleRad);

                nodePositions.push({ x: nodeX, y: nodeY, initial: company.initial, angle: company.angle });

                // Branch
                const branch = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                branch.setAttribute('d', `M${xStart},${yStart} L${xEnd},${yEnd}`);
                branch.setAttribute('class', 'branch');
                const branchLen = Math.sqrt((xEnd - xStart) ** 2 + (yEnd - yStart) ** 2);
                branch.style.setProperty('--branch-length', branchLen);
                branch.style.animationDelay = `${2.0 + i * 0.2}s`;
                branchesG.appendChild(branch);

                // Node group - positioned via transform attribute, NOT CSS
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'node-group');
                g.setAttribute('transform', `translate(${nodeX}, ${nodeY})`);
                // Set opacity via inline style for animation
                g.style.opacity = '0';
                g.style.animation = `nodeAppear 0.5s cubic-bezier(0.22, 1, 0.36, 1) ${2.4 + i * 0.2}s forwards`;
                nodesG.appendChild(g);

                // Inner group for scale animation (separate from position transform)
                const scaleG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                scaleG.setAttribute('class', 'node-scale');
                scaleG.style.animationDelay = `${2.4 + i * 0.2}s`;
                g.appendChild(scaleG);

                // Node frame
                const frame = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                frame.setAttribute('r', nodeRadius);
                frame.setAttribute('class', 'node-frame');
                frame.style.animationDelay = `${2.5 + i * 0.2}s`;
                scaleG.appendChild(frame);

                // Node text (placeholder logo)
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'node-text');
                text.textContent = company.initial;
                text.style.animationDelay = `${2.8 + i * 0.2}s`;
                scaleG.appendChild(text);
            });

            // Build the travel path: center -> all 4 nodes in order -> back to center
            let pathD = `M${centerX},${centerY}`;
            nodePositions.forEach(pos => {
                pathD += ` L${pos.x},${pos.y}`;
            });
            pathD += ` L${centerX},${centerY}`;
            travelPath.setAttribute('d', pathD);

            // Calculate total path length for timing
            const totalPathLength = travelPath.getTotalLength();

            // Calculate cumulative distances to each node for flash timing
            const nodeFlashTimes = [];
            let cumulativeDist = 0;

            // Center to first node
            const firstNodeDist = Math.sqrt((nodePositions[0].x - centerX) ** 2 + (nodePositions[0].y - centerY) ** 2);
            cumulativeDist += firstNodeDist;
            nodeFlashTimes.push(cumulativeDist / totalPathLength);

            // Between nodes
            for (let i = 1; i < nodePositions.length; i++) {
                const dist = Math.sqrt((nodePositions[i].x - nodePositions[i-1].x) ** 2 + (nodePositions[i].y - nodePositions[i-1].y) ** 2);
                cumulativeDist += dist;
                nodeFlashTimes.push(cumulativeDist / totalPathLength);
            }

            // Last node back to center
            const lastToCenter = Math.sqrt((centerX - nodePositions[nodePositions.length - 1].x) ** 2 + (centerY - nodePositions[nodePositions.length - 1].y) ** 2);
            cumulativeDist += lastToCenter;

            const travelDuration = 3; // seconds for the light to travel the full path

            // Set up the traveling light animation
            const animateMotion = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
            animateMotion.setAttribute('dur', `${travelDuration}s`);
            animateMotion.setAttribute('repeatCount', '1');
            animateMotion.setAttribute('fill', 'freeze');
            animateMotion.setAttribute('path', pathD);

            travelingLight.parentNode.appendChild(animateMotion);
            lightGlow.parentNode.appendChild(animateMotion.cloneNode(true));

            // Start the traveling light after all nodes are formed
            setTimeout(() => {
                travelingLight.classList.add('active');
                lightGlow.classList.add('active');
                travelingLight.style.setProperty('--travel-duration', `${travelDuration}s`);
                lightGlow.style.setProperty('--travel-duration', `${travelDuration}s`);

                // Trigger the animateMotion
                const motions = document.querySelectorAll('animateMotion');
                motions.forEach(m => m.beginElement());
            }, 3600);

            // Node flash effects as light passes through each node
            nodeFlashTimes.forEach((time, i) => {
                setTimeout(() => {
                    const flash = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    flash.setAttribute('cx', nodePositions[i].x);
                    flash.setAttribute('cy', nodePositions[i].y);
                    flash.setAttribute('r', nodeRadius);
                    flash.setAttribute('class', 'node-flash');
                    nodeFlashesG.appendChild(flash);
                    flash.getBoundingClientRect();
                    flash.classList.add('active');
                    setTimeout(() => flash.remove(), 700);
                }, (3600 + time * travelDuration * 1000));
            });

            // Build portfolio cards
            companies.forEach(company => {
                const card = document.createElement('div');
                card.className = 'portfolio-card';
                card.innerHTML = `
                    <div class="card-initial">${company.initial}</div>
                    <h3 class="card-title">${company.name}</h3>
                    <p class="card-description">${company.desc}</p>
                    <div class="card-tags">
                        ${company.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
                    </div>
                `;
                portfolioGrid.appendChild(card);
            });

            // Portfolio link smooth scroll
            portfolioLink.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            });

            scrollDown.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
