<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Monica Group — Strategic Investment Holding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --charcoal: #080808;
            --charcoal-light: #111111;
            --gold: #c9a84c;
            --gold-dim: rgba(201, 168, 76, 0.4);
            --gold-faint: rgba(201, 168, 76, 0.1);
            --white: #ffffff;
            --white-dim: rgba(255, 255, 255, 0.7);
            --slate: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== STARFIELD ===== */
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--twinkle-duration) ease-in-out infinite;
            animation-delay: var(--twinkle-delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--max-opacity); transform: scale(1); }
        }
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
            animation: nebulaDrift 20s ease-in-out infinite alternate;
        }
        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.1); }
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 24px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }
        nav.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        .nav-logo { display: flex; align-items: center; }
        .nav-logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 45px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--white-dim);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
            overflow: hidden;
            padding-top: 80px;
        }

        .ecosystem-svg {
            position: absolute;
            width: 85vmin;
            height: 85vmin;
            max-width: 900px;
            max-height: 900px;
            pointer-events: none;
            overflow: visible;
        }

        .main-circle {
            fill: none;
            stroke: var(--gold);
            stroke-width: 1;
            stroke-dasharray: 1885;
            stroke-dashoffset: 1885;
            opacity: 0.4;
        }

        .branch {
            fill: none;
            stroke: var(--gold);
            stroke-width: 1;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            opacity: 0.4;
        }

        .node-frame {
            fill: var(--black);
            stroke: var(--gold);
            stroke-width: 1;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .node-content {
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .node-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            fill: var(--white);
            text-anchor: middle;
            dominant-baseline: middle;
            letter-spacing: 0.05em;
        }

        /* Rotating light */
        .rotating-light {
            fill: none;
            stroke: var(--gold);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 80, 1805;
            stroke-dashoffset: 0;
            opacity: 0;
            filter: blur(1px);
            transform-origin: 400px 400px;
        }
        .rotating-light.active {
            opacity: 0.6;
            animation: rotateLight 10s linear infinite;
        }
        @keyframes rotateLight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Center content */
        .center-group {
            opacity: 0;
        }
        .center-group.visible {
            opacity: 1;
            transition: opacity 1s ease;
        }
        .center-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            fill: var(--white);
            text-anchor: middle;
        }
        .center-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            fill: var(--gold-dim);
            text-anchor: middle;
        }

        /* Scroll down */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            opacity: 0;
            text-decoration: none;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .scroll-down.visible {
            opacity: 1;
            pointer-events: all;
        }
        .scroll-down span {
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold-dim);
        }
        .scroll-arrow {
            width: 18px;
            height: 18px;
            border-right: 1px solid var(--gold-dim);
            border-bottom: 1px solid var(--gold-dim);
            transform: rotate(45deg);
            animation: bounceArrow 2s ease-in-out infinite;
        }
        @keyframes bounceArrow {
            0%, 100% { transform: rotate(45deg) translate(0, 0); }
            50% { transform: rotate(45deg) translate(4px, 4px); }
        }

        /* ===== NETFLIX-STYLE PORTFOLIO ===== */
        .content-transition {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
        }
        .content-transition.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .portfolio {
            padding: 100px 0 80px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-header {
            text-align: center;
            margin-bottom: 60px;
            padding: 0 50px;
        }
        .section-label {
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        /* Netflix-style rows */
        .industry-row {
            margin-bottom: 50px;
            padding: 0 50px;
        }
        .industry-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .industry-header h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }
        .industry-header .count {
            font-size: 0.65rem;
            color: var(--gold-dim);
            letter-spacing: 0.1em;
        }
        .industry-line {
            flex: 1;
            height: 1px;
            background: var(--gold-faint);
            margin-left: 10px;
        }

        /* Horizontal scrolling cards */
        .cards-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }
        .cards-row::-webkit-scrollbar {
            height: 4px;
        }
        .cards-row::-webkit-scrollbar-track {
            background: transparent;
        }
        .cards-row::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 2px;
        }

        .company-card {
            flex: 0 0 280px;
            background: var(--charcoal);
            border: 1px solid var(--gold-faint);
            border-radius: 6px;
            padding: 35px 28px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .company-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .company-card:hover::before {
            opacity: 1;
        }
        .company-card:hover {
            border-color: var(--gold-dim);
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 40px rgba(201,168,76,0.08);
        }
        .card-initial {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--gold);
            margin-bottom: 15px;
            line-height: 1;
            position: relative;
            z-index: 1;
        }
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 1;
        }
        .card-subtitle {
            font-size: 0.75rem;
            color: var(--gold-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .card-description {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--white-dim);
            font-weight: 300;
            position: relative;
            z-index: 1;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }
        .card-tag {
            font-size: 0.55rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--gold-faint);
            padding: 4px 10px;
            border-radius: 2px;
        }

        /* Organogram section */
        .organogram-section {
            padding: 80px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .organogram-header {
            text-align: center;
            margin-bottom: 60px;
        }
        .organogram-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }
        .organogram-header p {
            font-size: 0.9rem;
            color: var(--white-dim);
            margin-top: 10px;
        }
        .organogram-svg {
            width: 100%;
            max-width: 1000px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        footer {
            padding: 60px 50px;
            border-top: 1px solid var(--charcoal-light);
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--slate);
            text-transform: uppercase;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes drawPath { to { stroke-dashoffset: 0; } }

        @media (max-width: 900px) {
            nav { padding: 20px 30px; }
            .nav-links { display: none; }
            .section-title { font-size: 2.2rem; }
            .portfolio { padding: 60px 0; }
            .industry-row { padding: 0 30px; }
            .company-card { flex: 0 0 240px; }
            .ecosystem-svg { width: 95vmin; height: 95vmin; }
        }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>
    <div class="nebula" style="width: 500px; height: 500px; background: radial-gradient(circle, rgba(100,80,150,0.3) 0%, transparent 70%); top: 10%; left: -10%;"></div>
    <div class="nebula" style="width: 400px; height: 400px; background: radial-gradient(circle, rgba(80,100,120,0.3) 0%, transparent 70%); bottom: 20%; right: -5%; animation-delay: -5s;"></div>

    <nav id="navbar">
        <a href="index.html" class="nav-logo">
            <span class="nav-logo-text">SM</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="#portfolio" id="portfolioLink">Portfolio</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <div style="width: 120px;"></div>
    </nav>

    <main>
        <section class="hero" id="hero">
            <svg class="ecosystem-svg" viewBox="0 0 800 800">
                <circle cx="400" cy="400" r="300" class="main-circle" id="mainCircle" />
                <circle cx="400" cy="400" r="300" class="rotating-light" id="rotatingLight" />
                <g id="branchesG"></g>
                <g id="nodesG"></g>
                <g class="center-group" id="centerGroup">
                    <polygon points="400,360 420,395 400,430 380,395" fill="none" stroke="var(--gold)" stroke-width="1.5" opacity="0.8"/>
                    <circle cx="400" cy="395" r="8" fill="var(--gold)" opacity="0.6"/>
                    <text x="400" y="460" class="center-name">Santa Monica Group</text>
                    <text x="400" y="480" class="center-subtitle">Investment Holding</text>
                </g>
            </svg>

            <a href="#portfolio" class="scroll-down" id="scrollDown">
                <span>Explore</span>
                <div class="scroll-arrow"></div>
            </a>
        </section>

        <div class="content-transition" id="mainContent">
            <!-- ORGANOGRAM SECTION -->
            <section class="organogram-section" id="organogram">
                <div class="organogram-header">
                    <span class="section-label">Structure</span>
                    <h2>Investment Organogram</h2>
                    <p>Our portfolio organized by strategic industry verticals</p>
                </div>
                <svg class="organogram-svg" viewBox="0 0 1000 600" id="organogramSvg">
                    <!-- Will be drawn by JS -->
                </svg>
            </section>

            <!-- NETFLIX-STYLE PORTFOLIO -->
            <section class="portfolio" id="portfolio">
                <div class="section-header">
                    <span class="section-label">Investment Ecosystem</span>
                    <h2 class="section-title">Strategic Portfolio</h2>
                </div>
                <div id="portfolioRows"></div>
            </section>
            <footer>
                &copy; 2025 Santa Monica Group. Refined Excellence in Investment.
            </footer>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainCircle = document.getElementById('mainCircle');
            const rotatingLight = document.getElementById('rotatingLight');
            const branchesG = document.getElementById('branchesG');
            const nodesG = document.getElementById('nodesG');
            const centerGroup = document.getElementById('centerGroup');
            const navbar = document.getElementById('navbar');
            const mainContent = document.getElementById('mainContent');
            const scrollDown = document.getElementById('scrollDown');
            const starfield = document.getElementById('starfield');
            const portfolioLink = document.getElementById('portfolioLink');
            const organogramSvg = document.getElementById('organogramSvg');
            const portfolioRows = document.getElementById('portfolioRows');

            // Real companies grouped by industry
            const industries = {
                'Property': [
                    { name: 'Mkhize Property Fund', abbr: 'MPF', desc: 'A leading property investment fund focused on commercial and residential real estate development across South Africa.' }
                ],
                'Energy': [
                    { name: 'Oregano Power and Energy Group', abbr: 'OPEG', desc: 'An integrated energy company specializing in power generation, renewable energy solutions, and energy infrastructure. www.opeg.co.za', website: 'www.opeg.co.za' }
                ],
                'Infrastructure': [
                    { name: 'JSS Infrastructure Group', abbr: '4JSS', desc: 'A infrastructure development and management company delivering large-scale civil engineering and construction projects.' },
                    { name: 'SASACO', abbr: 'SASACO', desc: 'A strategic infrastructure holding company with interests in transport, logistics, and public-private partnerships.' }
                ],
                'Private Equity & Venture Capital': [
                    { name: 'Ventaris Capital Partners', abbr: 'Ventaris', desc: 'A private equity and venture capital firm investing in high-growth businesses across technology, healthcare, and consumer sectors.' }
                ],
                'Travel & Hospitality': [
                    { name: 'Luendo Travel', abbr: 'Luendo', desc: 'A premium travel and hospitality group offering curated travel experiences, luxury accommodation, and destination management services.' }
                ],
                'Financial Assets': [
                    { name: 'Allan Gray', abbr: 'Allan Gray', desc: 'One of Africa's largest independent investment management firms, managing financial assets at fair value through profit and loss.' },
                    { name: 'Coronation Fund Managers', abbr: 'Coronation', desc: 'A leading South African asset management firm specializing in long-term investment strategies and financial assets at FVTPL.' }
                ]
            };

            // All companies for the hero mind map (8 companies)
            const allCompanies = [
                { name: 'Mkhize Property Fund', abbr: 'MPF', angle: -90 },
                { name: 'Oregano Power & Energy', abbr: 'OPEG', angle: -45 },
                { name: 'JSS Infrastructure', abbr: '4JSS', angle: 0 },
                { name: 'SASACO', abbr: 'SASACO', angle: 45 },
                { name: 'Ventaris Capital', abbr: 'Ventaris', angle: 90 },
                { name: 'Luendo Travel', abbr: 'Luendo', angle: 135 },
                { name: 'Allan Gray', abbr: 'Allan Gray', angle: 180 },
                { name: 'Coronation', abbr: 'Coronation', angle: 225 }
            ];

            const centerX = 400;
            const centerY = 400;
            const innerRadius = 300;
            const branchLength = 90;
            const nodeRadius = 42;

            // Stars
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 1.5 + 0.5;
                star.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
                    --twinkle-duration: ${2 + Math.random() * 3}s;
                    --twinkle-delay: ${Math.random() * 5}s;
                    --max-opacity: ${Math.random() * 0.5 + 0.1};
                `;
                starfield.appendChild(star);
            }

            // Build hero SVG ecosystem
            allCompanies.forEach((company, i) => {
                const angleRad = (company.angle * Math.PI) / 180;
                const xStart = centerX + innerRadius * Math.cos(angleRad);
                const yStart = centerY + innerRadius * Math.sin(angleRad);
                const branchEndDist = innerRadius + branchLength - nodeRadius;
                const xEnd = centerX + branchEndDist * Math.cos(angleRad);
                const yEnd = centerY + branchEndDist * Math.sin(angleRad);
                const nodeX = centerX + (innerRadius + branchLength) * Math.cos(angleRad);
                const nodeY = centerY + (innerRadius + branchLength) * Math.sin(angleRad);

                const branch = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                branch.setAttribute('d', `M${xStart},${yStart} L${xEnd},${yEnd}`);
                branch.setAttribute('class', 'branch');
                branch.setAttribute('id', `branch-${i}`);
                branchesG.appendChild(branch);

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('transform', `translate(${nodeX}, ${nodeY})`);

                const frame = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                frame.setAttribute('r', nodeRadius);
                frame.setAttribute('class', 'node-frame');
                frame.setAttribute('id', `node-frame-${i}`);
                g.appendChild(frame);

                const contentG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                contentG.setAttribute('class', 'node-content');
                contentG.setAttribute('id', `node-content-${i}`);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'node-text');
                text.setAttribute('style', 'font-size: 14px;');
                text.textContent = company.abbr;
                contentG.appendChild(text);

                g.appendChild(contentG);
                nodesG.appendChild(g);
            });

            // Build Organogram
            function buildOrganogram() {
                const svg = organogramSvg;
                const svgNS = 'http://www.w3.org/2000/svg';
                const industryNames = Object.keys(industries);
                const numIndustries = industryNames.length;

                // Center hub
                const hub = document.createElementNS(svgNS, 'circle');
                hub.setAttribute('cx', '500');
                hub.setAttribute('cy', '80');
                hub.setAttribute('r', '50');
                hub.setAttribute('fill', 'none');
                hub.setAttribute('stroke', '#c9a84c');
                hub.setAttribute('stroke-width', '1');
                hub.setAttribute('opacity', '0.6');
                svg.appendChild(hub);

                const hubText = document.createElementNS(svgNS, 'text');
                hubText.setAttribute('x', '500');
                hubText.setAttribute('y', '85');
                hubText.setAttribute('text-anchor', 'middle');
                hubText.setAttribute('fill', '#fff');
                hubText.setAttribute('font-family', 'Cormorant Garamond, serif');
                hubText.setAttribute('font-size', '14');
                hubText.setAttribute('letter-spacing', '0.1em');
                hubText.textContent = 'Santa Monica';
                svg.appendChild(hubText);

                // Industry nodes
                const startX = 120;
                const spacing = 155;
                const industryY = 220;
                const companyY = 380;

                industryNames.forEach((industry, i) => {
                    const x = startX + (i * spacing);

                    // Branch from hub to industry
                    const branch = document.createElementNS(svgNS, 'path');
                    branch.setAttribute('d', `M500,130 Q${x},180 ${x},170`);
                    branch.setAttribute('stroke', 'rgba(201,168,76,0.3)');
                    branch.setAttribute('stroke-width', '1');
                    branch.setAttribute('fill', 'none');
                    svg.appendChild(branch);

                    // Industry node
                    const node = document.createElementNS(svgNS, 'rect');
                    node.setAttribute('x', x - 60);
                    node.setAttribute('y', industryY - 25);
                    node.setAttribute('width', '120');
                    node.setAttribute('height', '50');
                    node.setAttribute('rx', '4');
                    node.setAttribute('fill', '#080808');
                    node.setAttribute('stroke', 'rgba(201,168,76,0.4)');
                    node.setAttribute('stroke-width', '1');
                    svg.appendChild(node);

                    const industryText = document.createElementNS(svgNS, 'text');
                    industryText.setAttribute('x', x);
                    industryText.setAttribute('y', industryY + 5);
                    industryText.setAttribute('text-anchor', 'middle');
                    industryText.setAttribute('fill', '#c9a84c');
                    industryText.setAttribute('font-family', 'Inter, sans-serif');
                    industryText.setAttribute('font-size', '10');
                    industryText.setAttribute('font-weight', '500');
                    industryText.setAttribute('letter-spacing', '0.1em');
                    industryText.textContent = industry;
                    svg.appendChild(industryText);

                    // Companies under this industry
                    const companies = industries[industry];
                    const compSpacing = 140;
                    const totalWidth = (companies.length - 1) * compSpacing;
                    const startCompX = x - (totalWidth / 2);

                    companies.forEach((comp, j) => {
                        const compX = startCompX + (j * compSpacing);

                        // Branch from industry to company
                        const compBranch = document.createElementNS(svgNS, 'path');
                        compBranch.setAttribute('d', `M${x},${industryY + 25} Q${compX},${companyY - 40} ${compX},${companyY - 30}`);
                        compBranch.setAttribute('stroke', 'rgba(201,168,76,0.2)');
                        compBranch.setAttribute('stroke-width', '1');
                        compBranch.setAttribute('fill', 'none');
                        svg.appendChild(compBranch);

                        // Company node
                        const compNode = document.createElementNS(svgNS, 'rect');
                        compNode.setAttribute('x', compX - 55);
                        compNode.setAttribute('y', companyY - 20);
                        compNode.setAttribute('width', '110');
                        compNode.setAttribute('height', '40');
                        compNode.setAttribute('rx', '3');
                        compNode.setAttribute('fill', '#111111');
                        compNode.setAttribute('stroke', 'rgba(201,168,76,0.25)');
                        compNode.setAttribute('stroke-width', '1');
                        svg.appendChild(compNode);

                        const compText = document.createElementNS(svgNS, 'text');
                        compText.setAttribute('x', compX);
                        compText.setAttribute('y', companyY - 2);
                        compText.setAttribute('text-anchor', 'middle');
                        compText.setAttribute('fill', '#fff');
                        compText.setAttribute('font-family', 'Inter, sans-serif');
                        compText.setAttribute('font-size', '9');
                        compText.setAttribute('opacity', '0.8');
                        compText.textContent = comp.abbr;
                        svg.appendChild(compText);
                    });
                });
            }
            buildOrganogram();

            // Build Netflix-style rows
            Object.entries(industries).forEach(([industry, companies]) => {
                const row = document.createElement('div');
                row.className = 'industry-row';

                const header = document.createElement('div');
                header.className = 'industry-header';
                header.innerHTML = `
                    <h3>${industry}</h3>
                    <span class="count">${companies.length} compan${companies.length > 1 ? 'ies' : 'y'}</span>
                    <div class="industry-line"></div>
                `;
                row.appendChild(header);

                const cardsRow = document.createElement('div');
                cardsRow.className = 'cards-row';

                companies.forEach(company => {
                    const card = document.createElement('div');
                    card.className = 'company-card';
                    card.innerHTML = `
                        <div class="card-initial">${company.abbr}</div>
                        <h3 class="card-title">${company.name}</h3>
                        <div class="card-subtitle">${industry}</div>
                        <p class="card-description">${company.desc}</p>
                        <div class="card-tags">
                            <span class="card-tag">${industry}</span>
                        </div>
                    `;
                    cardsRow.appendChild(card);
                });

                row.appendChild(cardsRow);
                portfolioRows.appendChild(row);
            });

            // Portfolio link smooth scroll
            portfolioLink.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            });

            // Animation
            setTimeout(() => {
                centerGroup.classList.add('visible');
            }, 400);

            setTimeout(() => {
                mainCircle.style.animation = 'drawPath 1.5s ease forwards';
            }, 1200);

            allCompanies.forEach((_, i) => {
                const startTime = 2200 + (i * 400);
                setTimeout(() => {
                    const branch = document.getElementById(`branch-${i}`);
                    branch.style.transition = 'stroke-dashoffset 0.6s ease-out';
                    branch.style.strokeDashoffset = '0';
                    setTimeout(() => {
                        document.getElementById(`node-frame-${i}`).style.opacity = '1';
                        document.getElementById(`node-content-${i}`).style.opacity = '1';
                    }, 400);
                }, startTime);
            });

            const endScene = 2200 + (allCompanies.length * 400);
            setTimeout(() => {
                rotatingLight.classList.add('active');
                scrollDown.classList.add('visible');
            }, endScene + 300);

            setTimeout(() => {
                navbar.classList.add('visible');
                mainContent.classList.add('visible');
                document.body.style.overflowY = 'auto';
            }, endScene + 1500);

            document.body.style.overflow = 'hidden';

            scrollDown.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
